mode: standalone
replicas: 1

rootUser: <USER>
rootPassword: <PASSWORD>

persistence:
  enabled: true
  existingClaim: minio-pvc
  storageClass: local-minio
  accessMode: ReadWriteOnce
  size: 20Gi

resources:
  requests:
    memory: 1Gi

service:
  type: ClusterIP

environment:
  MINIO_BROWSER_REDIRECT_URL: <REDIRECT_URL>

nodeSelector:
  kubernetes.io/hostname: <WORKER_NODE>
