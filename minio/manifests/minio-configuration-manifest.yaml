# Namespace

apiVersion: v1
kind: Namespace
metadata:
  name: minio-system

---

# Service

apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio-system
spec:
  selector:
    app: minio
  type: ClusterIP
  ports:
    - name: s3
      port: 9000
      targetPort: 9000

---

# Ingress console

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console-ingress
  namespace: minio-system
  annotations:
    cert-manager.io/cluster-issuer: <cluster-issuer>
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - <host>
      secretName: <tls_certificate>
  rules:
    - host: <host>
      http:
        paths:
          - path: /console/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: minio-console
                port:
                  number: 9001

---

# Ingress API

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-api-ingress
  namespace: minio-system
  annotations:
    cert-manager.io/cluster-issuer: <cluster-issuer>
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - <host>
      secretName: <tls_certificate>
  rules:
    - host: <host>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-proxy
                port:
                  number: 8080

---

# StorageClass

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-minio
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer

---

# PersistentVolume

apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-pv
spec:
  capacity:
    storage: 25Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: local-minio
  persistentVolumeReclaimPolicy: Retain
  local:
    path: <local_mount_path>
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - <woker_node>

---

# PersistentVolumeClaim

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: minio-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-minio
  volumeName: <volume_name>
  resources:
    requests:
      storage: 20Gi
